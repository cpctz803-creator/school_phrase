<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teen Slang Phrase App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 10代に好まれるネオン調グラデーションの微調整 */
        .neon-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
        }
    </style>
</head>
<body class="neon-bg text-slate-100 min-h-screen font-sans">

    <header class="text-center py-8 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-cyan-400 via-pink-500 to-yellow-400 bg-clip-text text-transparent">
            Teen Slang Hub 📱⚡
        </h1>
        <p class="text-xs text-slate-400 mt-2">タップで一瞬でコピペ！SNSやチャットで使いこなせ</p>
        
        <div class="max-w-md mx-auto mt-4 px-4">
            <input type="text" id="searchInput" placeholder="キーワード、意味、フレーズで検索..." 
                   class="w-full px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-pink-500 text-sm">
        </div>

        <div class="flex justify-center gap-2 mt-4 px-4 overflow-x-auto no-scrollbar" id="tabContainer">
            <button class="tab-btn px-3 py-1.5 rounded-full text-xs font-bold transition bg-pink-500 text-white" data-category="All">All</button>
            <button class="tab-btn px-3 py-1.5 rounded-full text-xs font-bold transition bg-slate-800 text-slate-400 hover:bg-slate-700" data-category="School & Chill">🏫 学校・放課後</button>
            <button class="tab-btn px-3 py-1.5 rounded-full text-xs font-bold transition bg-slate-800 text-slate-400 hover:bg-slate-700" data-category="Gaming & Online">🎮 ゲーム・ネット</button>
            <button class="tab-btn px-3 py-1.5 rounded-full text-xs font-bold transition bg-slate-800 text-slate-400 hover:bg-slate-700" data-category="Drama & Mood">😭 無理・病んだ</button>
            <button class="tab-btn px-3 py-1.5 rounded-full text-xs font-bold transition bg-slate-800 text-slate-400 hover:bg-slate-700" data-category="Short & Quick">💬 短縮・相槌</button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div id="phraseGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
            <p class="text-center text-slate-500 col-span-full py-12">データを読み込んでいます...</p>
        </div>
    </main>

    <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-emerald-500 to-teal-600 text-white px-6 py-3 rounded-full shadow-lg font-bold text-sm tracking-wide opacity-0 transition-opacity duration-300 pointer-events-none z-50">
        Copied to clipboard! ⚡
    </div>

    <script>
        let allPhrases = [];
        let currentCategory = 'All';

        const phraseGrid = document.getElementById('phraseGrid');
        const searchInput = document.getElementById('searchInput');
        const tabButtons = document.querySelectorAll('.tab-btn');
        const toast = document.getElementById('toast');

        // 1. JSONデータの読み込み
        async function loadPhrases() {
            try {
                // 同一階層にある phrases.json を取得
                const response = await fetch('phrases.json');
                allPhrases = await response.json();
                renderPhrases();
            } catch (error) {
                console.error('Error loading JSON:', error);
                phraseGrid.innerHTML = `<p class="text-center text-rose-500 col-span-full">マスターデータ(phrases.json)が見つからないか、読み込めません。</p>`;
            }
        }

        // 2. フレーズのレンダリング（描画）
        function renderPhrases() {
            const keyword = searchInput.value.toLowerCase();
            
            // フィルタリング処理
            const filtered = allPhrases.filter(item => {
                const matchCategory = (currentCategory === 'All' || item.category === currentCategory);
                const matchKeyword = (
                    item.phrase.toLowerCase().includes(keyword) || 
                    item.meaning.toLowerCase().includes(keyword) || 
                    item.situation.toLowerCase().includes(keyword)
                );
                return matchCategory && matchKeyword;
            });

            // グリッドをクリア
            phraseGrid.innerHTML = '';

            if (filtered.length === 0) {
                phraseGrid.innerHTML = `<p class="text-center text-slate-500 col-span-full py-12">該当するフレーズが見つかりません 🥺</p>`;
                return;
            }

            // カードの生成
            filtered.forEach(item => {
                const card = document.createElement('div');
                card.className = 'bg-slate-900/60 border border-slate-800 hover:border-slate-700 rounded-2xl p-5 cursor-pointer transition-all duration-200 transform hover:-translate-y-1 hover:shadow-xl flex flex-col justify-between active:scale-95';
                
                // タップでコピーイベントを設定
                card.onclick = () => copyToClipboard(item.phrase);

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded bg-slate-800 text-slate-400 border border-slate-700/50">
                                ${item.category}
                            </span>
                            <span class="text-slate-600 text-xs font-mono">#${String(item.id).padStart(2, '0')}</span>
                        </div>
                        <h3 class="text-xl font-black text-cyan-400 tracking-wide font-mono mb-1 select-all">${item.phrase}</h3>
                        <p class="text-sm font-bold text-pink-400 mb-2">${item.meaning}</p>
                    </div>
                    <p class="text-xs text-slate-400 bg-slate-950/40 p-2.5 rounded-xl border border-slate-800/40 mt-2">
                        ${item.situation}
                    </p>
                `;
                phraseGrid.appendChild(card);
            });
        }

        // 3. クリップボードへのコピペ＆通知処理
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                // トースト通知を表示
                toast.classList.remove('opacity-0');
                toast.classList.add('opacity-100');
                
                setTimeout(() => {
                    toast.classList.remove('opacity-100');
                    toast.classList.add('opacity-0');
                }, 1500);
            }).catch(err => {
                console.error('Copy failed:', err);
            });
        }

        // 4. イベントリスナー（検索＆タブ切り替え）
        searchInput.addEventListener('input', renderPhrases);

        tabButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                // ボタンのスタイル切り替え
                tabButtons.forEach(b => {
                    b.classList.remove('bg-pink-500', 'text-white');
                    b.classList.add('bg-slate-800', 'text-slate-400');
                });
                e.target.classList.remove('bg-slate-800', 'text-slate-400');
                e.target.classList.add('bg-pink-500', 'text-white');

                // カテゴリー更新と再描画
                currentCategory = e.target.getAttribute('data-category');
                renderPhrases();
            });
        });

        // アプリ起動
        loadPhrases();
    </script>
</body>
</html>
